# =========================================================================
# The Summoner's Chronicle - Development Pipeline Configuration
# =========================================================================
# Environment variables for the complete development stack
#
# Usage:
#   - Source in shell: source development.cfg (Linux/Mac) or set (Windows)
#   - Load in code: import configparser; cfg = configparser.ConfigParser(); cfg.read('development.cfg')
#   - Docker: ENV variables from this file
#   - CI/CD: Pass values as secrets/environment variables
#
# CRITICAL: Never commit API keys or secrets to version control.
# Use this file as a TEMPLATE - create development.cfg.local for sensitive data.
# =========================================================================

[project]
# Project metadata
PROJECT_NAME=The Summoner's Chronicle
PROJECT_SLUG=info-lol
PROJECT_VERSION=0.0.3
PROJECT_VERSION_DATE=2026-04-10
PROJECT_VERSION_STAGE=development
PROJECT_ROOT=C:\dev\league-of-legends\info-lol
REPOSITORY_NAME=info-lol
ENVIRONMENT=development
DEBUG_MODE=true

[frontend]
# Frontend technology stack
FRONTEND_FRAMEWORK=React
FRONTEND_LANGUAGE=JavaScript
FRONTEND_BUILD_TOOL=Webpack
FRONTEND_PORT=3000
FRONTEND_HOST=localhost
FRONTEND_BUILD_DIR=dist
FRONTEND_ENTRY_POINT=src/index.jsx
REACT_VERSION=18.2.0
NODE_ENV=development

# Frontend build configuration
FRONTEND_BUNDLE_ANALYZE=false
FRONTEND_SOURCE_MAPS=true
FRONTEND_MINIFY=false
FRONTEND_CODE_SPLITTING=true

# Frontend dependencies
FRONTEND_STATE_MANAGEMENT=React Context
FRONTEND_HTTP_CLIENT=Axios
FRONTEND_UI_LIBRARY=Custom CSS

[backend]
# Backend technology stack
BACKEND_FRAMEWORK=Flask
BACKEND_LANGUAGE=Python
BACKEND_PORT=5000
BACKEND_HOST=localhost
BACKEND_VERSION=3.9
PYTHON_ENV=development
BACKEND_WORKERS=1

# Backend configuration
BACKEND_LOG_LEVEL=DEBUG
BACKEND_RELOAD_ON_CHANGE=true
BACKEND_CORS_ENABLED=true
CORS_ORIGINS=http://localhost:3000,http://localhost:8080

# Backend API
BACKEND_API_VERSION=v1
BACKEND_API_PREFIX=/api/v1
BACKEND_API_TIMEOUT=30

[database]
# Database configuration
DATABASE_TYPE=SQLite
DATABASE_HOST=localhost
DATABASE_PORT=
DATABASE_NAME=summoners_chronicle.db
DATABASE_USER=developer
DATABASE_PASSWORD=
DATABASE_POOL_SIZE=5
DATABASE_MAX_OVERFLOW=10

# Database paths
DATABASE_PATH=./data/summoners_chronicle.db
MIGRATIONS_PATH=./backend/migrations
SEED_DATA_PATH=./backend/seeds

[cache]
# Cache configuration
CACHE_TYPE=memory
CACHE_REDIS_URL=redis://localhost:6379/0
CACHE_TTL=3600
CACHE_ENABLED=true

[api_integration]
# Riot Games API Configuration
RIOT_API_KEY=RGAPI-YOUR-API-KEY-HERE
RIOT_API_BASE_URL=https://na1.api.riotgames.com
RIOT_API_TIMEOUT=10
RIOT_API_RATE_LIMIT=20:1m
RIOT_REGIONS=na1,euw1,kr

# API Rate Limiting
API_RATE_LIMIT_ENABLED=true
API_RATE_LIMIT_REQUESTS=100
API_RATE_LIMIT_PERIOD=3600

[security]
# Security configuration
SECRET_KEY=your-secret-key-change-in-production
ALLOWED_HOSTS=localhost,127.0.0.1,localhost:3000
HTTPS_ENABLED=false
CSRF_ENABLED=true
SESSION_TIMEOUT=3600
JWT_SECRET=your-jwt-secret-key
JWT_ALGORITHM=HS256

# Authentication
AUTH_PROVIDER=OAuth2
OAUTH2_PROVIDER=Riot Games
OAUTH_CLIENT_ID=
OAUTH_CLIENT_SECRET=

# CORS
CORS_ALLOW_CREDENTIALS=true
CORS_MAX_AGE=3600

[logging]
# Logging configuration
LOG_LEVEL=DEBUG
LOG_FORMAT=%(asctime)s - %(name)s - %(levelname)s - %(message)s
LOG_FILE_PATH=./logs/development.log
LOG_MAX_SIZE=10485760
LOG_BACKUP_COUNT=5
LOG_CONSOLE_OUTPUT=true

# Logging services
LOG_TO_FILE=true
LOG_TO_STDOUT=true
LOG_STRUCTURED=false

[storage]
# File storage configuration
STORAGE_TYPE=local
STORAGE_PATH=./data/uploads
STORAGE_MAX_FILE_SIZE=52428800
ALLOWED_FILE_TYPES=.png,.jpg,.jpeg,.gif,.webp,.csv,.json

# Output directory for generated graphics
OUTPUT_DIR=./data/outputs
TEMP_DIR=./data/temp
CACHE_DIR=./data/cache

[deployment]
# Deployment configuration
DEPLOYMENT_ENVIRONMENT=development
DEPLOYMENT_PLATFORM=local
DEPLOYMENT_DOCKER_ENABLED=false
DEPLOYMENT_DOCKER_IMAGE=summoners-chronicle:latest

# Frontend deployment
FRONTEND_DEPLOY_SERVICE=Vercel
FRONTEND_DEPLOY_REGION=us-east-1
FRONTEND_DEPLOY_BRANCH=main

# Backend deployment
BACKEND_DEPLOY_SERVICE=Heroku
BACKEND_DEPLOY_REGION=us-east-1
BACKEND_DEPLOY_DYNOS=1

[testing]
# Testing configuration
TEST_ENVIRONMENT=test
TEST_DATABASE=summoners_chronicle_test.db
TEST_COVERAGE_MINIMUM=80
TEST_TIMEOUT=30

# Unit testing
UNIT_TEST_FRAMEWORK=pytest
UNIT_TEST_RUNNER=pytest
UNIT_TEST_VERBOSE=true

# Integration testing
INTEGRATION_TEST_ENABLED=true
INTEGRATION_TEST_API_MOCK=true

# E2E testing
E2E_TEST_ENABLED=false
E2E_TEST_BROWSER=chromium

[quality]
# Code quality configuration
LINTING_ENABLED=true
LINTING_STRICT_MODE=true
CODE_FORMATTER=Black
CODE_FORMATTER_LINE_LENGTH=100

# Type checking
TYPE_CHECKING_ENABLED=true
TYPE_CHECKER=mypy

# Test coverage
COVERAGE_ENABLED=true
COVERAGE_MINIMUM=80
COVERAGE_CRITICAL_PATHS=90

# Pre-commit hooks
PRECOMMIT_HOOKS_ENABLED=true
PRECOMMIT_LINT=true
PRECOMMIT_FORMAT=true
PRECOMMIT_TYPE_CHECK=true

[monitoring]
# Monitoring configuration
MONITORING_ENABLED=true
METRICS_ENABLED=true
METRICS_PORT=8001
HEALTH_CHECK_ENABLED=true
HEALTH_CHECK_INTERVAL=60

# Application Performance Monitoring
APM_ENABLED=false
APM_SERVICE_NAME=summoners-chronicle
APM_SERVER_URL=

# Error tracking
ERROR_TRACKING_ENABLED=false
ERROR_TRACKING_SERVICE=Sentry
SENTRY_DSN=

[development]
# Development-specific settings
HOT_RELOAD_ENABLED=true
SOURCE_MAPS_ENABLED=true
VERBOSE_LOGGING=true
MOCK_DATA_ENABLED=true
DEVELOPMENT_MODE=true

# Development tools
DEVELOPMENT_TOOLS_ENABLED=true
BROWSER_DEVTOOLS=true
PROFILER_ENABLED=false

# Auto-formatting on save
AUTO_FORMAT_ON_SAVE=true
AUTO_LINT_ON_SAVE=false

[ai_assistance]
# AI Assistance configuration
AI_ASSISTANCE_ENABLED=true
AI_BOILERPLATE_GENERATION=true
AI_DOCUMENTATION_GENERATION=true
AI_TEST_GENERATION=true
AI_DEBUGGING_ASSISTANCE=true

# AI service
AI_SERVICE=Claude
AI_MODEL=claude-opus
AI_API_KEY=
AI_MAX_TOKENS=4096

[features]
# Feature flags
FEATURE_HEATMAP_ENABLED=true
FEATURE_WIN_PROBABILITY_ENABLED=true
FEATURE_NLG_ENABLED=true
FEATURE_BUILD_ADAPTATION_ENABLED=true
FEATURE_ROLE_NORMALIZATION_ENABLED=true

# UI Features
FEATURE_DARK_MODE=false
FEATURE_EXPORT_PDF=false
FEATURE_SHARE_GRAPHIC=false
FEATURE_CUSTOM_BRANDING=false

[performance]
# Performance configuration
CACHE_ENABLED=true
COMPRESSION_ENABLED=true
IMAGE_OPTIMIZATION=true
LAZY_LOADING_ENABLED=true

# Performance thresholds
MAX_RESPONSE_TIME=2000
MAX_INITIAL_LOAD_TIME=3000
MAX_GRAPHIC_GENERATION_TIME=5000

[paths]
# Path configuration
SRC_DIR=./src
BACKEND_DIR=./backend
FRONTEND_DIR=./frontend
TESTS_DIR=./tests
DOCS_DIR=./.docs
PACKAGES_DIR=./packages
CONFIG_DIR=./.claude

# Output paths
DIST_DIR=./dist
BUILD_DIR=./build
REPORTS_DIR=./reports

[external_services]
# Third-party service configuration
ANALYTICS_ENABLED=false
ANALYTICS_ID=

# Email service
EMAIL_ENABLED=false
EMAIL_PROVIDER=
EMAIL_FROM=noreply@summoners-chronicle.local

# Image processing
IMAGE_PROCESSING_SERVICE=local
IMAGE_PROCESSING_QUALITY=85

[infrastructure]
# Infrastructure configuration
INFRASTRUCTURE_AS_CODE=terraform
INFRASTRUCTURE_BACKEND=local
INFRASTRUCTURE_STATE_FILE=./terraform/terraform.tfstate

# Containerization
CONTAINER_RUNTIME=docker
CONTAINER_REGISTRY=local

# CI/CD
CI_CD_PLATFORM=GitHub Actions
CI_CD_ENABLED=true
CI_CD_WORKFLOWS_DIR=./.github/workflows

[version_control]
# Version control configuration
VCS_TYPE=git
VCS_BRANCH_MAIN=main
VCS_BRANCH_DEVELOP=develop
VCS_REMOTE_ORIGIN=origin

# Git hooks
GIT_HOOKS_ENABLED=true
GIT_PRECOMMIT_HOOKS=true
GIT_PREPUSH_HOOKS=true

[compliance]
# Compliance and governance
QUALITY_MANDATE_ENABLED=true
QUALITY_MANDATE_FILE=./.docs/DEVELOPER_AGENT_QUALITY_MANDATE.md
SETTINGS_FILE=./.claude/settings.json

# Access control
STRICT_ACCESS_CONTROL=true
PROTECTED_FILES_ENABLED=true
SCOPE_ENFORCEMENT=true

# =========================================================================
# CONFIGURATION NOTES
# =========================================================================
#
# 1. SECRETS MANAGEMENT
#    - Never commit real API keys to version control
#    - Use development.cfg.local for local development secrets
#    - Use environment variables in CI/CD pipelines
#    - Add *.local to .gitignore
#
# 2. ENVIRONMENT-SPECIFIC OVERRIDES
#    - development.cfg (this file) = defaults
#    - development.cfg.local = local overrides (gitignored)
#    - Environment variables override both
#
# 3. LOADING THIS FILE
#    Python:
#      import configparser
#      config = configparser.ConfigParser()
#      config.read('development.cfg')
#      api_key = config.get('api_integration', 'RIOT_API_KEY')
#
#    Bash/Shell:
#      source development.cfg
#      echo $RIOT_API_KEY
#
#    Docker:
#      env_file: development.cfg
#
# 4. REQUIRED SETUP BEFORE DEVELOPMENT
#    [ ] Update RIOT_API_KEY with actual API key from Riot Games
#    [ ] Update SECRET_KEY with a secure random string
#    [ ] Update JWT_SECRET with a secure random string
#    [ ] Create development.cfg.local with sensitive values
#    [ ] Ensure all paths exist or are created by initialization scripts
#    [ ] Verify API_BASE_URL endpoints are correct for your region
#
# 5. QUALITY MANDATE INTEGRATION
#    All development must comply with:
#    - DEVELOPER_AGENT_QUALITY_MANDATE.md (7 pillars of code quality)
#    - .claude/settings.json (strict access control policy)
#    - This config file must not be modified without documentation
#
# =========================================================================
