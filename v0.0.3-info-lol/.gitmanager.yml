# ==========================================================================
# Git Manager Configuration — The Summoner's Chronicle v0.0.3
# ==========================================================================
# This file configures the Git Manager Agent for pre-push repository reviews.
# See: .docs/project-management/[internal] GIT_MANAGER.txt
# ==========================================================================

# Branch Protection
# --------------------------------------------------------------------------
# Branches matching these patterns require additional scrutiny before push.
protected_branches:
  - main
  - master
  - develop
  - "release/*"
  - "production/*"

# File Size Limits
# --------------------------------------------------------------------------
# Files exceeding this limit (in MB) will trigger a FAIL.
max_file_size_mb: 5

# Allowed Binary Extensions
# --------------------------------------------------------------------------
# Binary file extensions that are permitted in the repository.
# Empty list means no binaries are allowed (default).
allowed_binaries: []

# Commit Message Format
# --------------------------------------------------------------------------
# Regex pattern for valid commit subject lines.
# Follows Conventional Commits: type(optional-scope): description
commit_message_pattern: "^(feat|fix|docs|style|refactor|test|chore|build|ci|perf|revert)(\\(.+\\))?:\\s.{1,72}$"

# Lint Exclusions
# --------------------------------------------------------------------------
# Paths excluded from linter and formatter checks.
skip_lint_on_paths:
  - ".docs/**"
  - "packages/**"
  - "*.md"
  - "*.txt"
  - "*.cfg"

# Test Command
# --------------------------------------------------------------------------
# Command to run the test suite during quality checks.
test_command: "python -m pytest utils/tests/ -v --tb=short"

# Warning Behavior
# --------------------------------------------------------------------------
# If true, warnings are treated as failures. Default: false.
fail_on_warning: false

# Sensitive Data Patterns
# --------------------------------------------------------------------------
# Regex patterns scanned against added lines in the diff.
# A match triggers a FAIL.
sensitive_patterns:
  - "AKIA[0-9A-Z]{16}"
  - "BEGIN.*PRIVATE KEY"
  - "password\\s*=\\s*['\"][^'\"]+['\"]"
  - "RIOT_API_KEY\\s*=\\s*['\"][^'\"]+['\"]"
  - "JWT_SECRET\\s*=\\s*['\"][^'\"]+['\"]"
  - "SECRET_KEY\\s*=\\s*['\"][^'\"]+['\"]"
  - "RGAPI-[a-f0-9\\-]{36}"

# Forbidden Files
# --------------------------------------------------------------------------
# Files or patterns that must never be committed.
forbidden_files:
  - "development.cfg.local"
  - "*.cfg.local"
  - ".env"
  - ".env.local"
  - ".env.*.local"
  - "secrets.json"
  - "credentials.json"
  - "tmp*.cfg"
  - "*.key"
  - "*.pem"
